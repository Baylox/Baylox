<svg width="660" height="430" viewBox="0 0 660 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fenêtre terminal -->
  <rect width="660" height="430" rx="8" fill="#0d1117"/>
  <rect width="660" height="32" rx="8" fill="#161b22"/>
  <rect y="24" width="660" height="8" fill="#161b22"/>

  <!-- Boutons fenêtre -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>

  <!-- Titre terminal -->
  <text x="330" y="21" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6e7681">bash</text>

  <!-- ===== Commande 1 : whoami (t=0) ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.25s" fill="freeze"/>
    <text x="20" y="62" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#00cfff" filter="url(#glow)">baylox@github</text>
    <text x="136" y="62" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">:</text>
    <text x="144" y="62" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">~</text>
    <text x="156" y="62" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">$</text>
    <text x="170" y="62" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#e6edf3"> whoami</text>
  </g>

  <!-- Sortie whoami (t=0.8) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.25s" fill="freeze"/>
    <text x="20" y="88" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9">
      Web developer from France, focused on backend architecture,
    </text>
    <text x="20" y="108" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9">
      data engineering and application security.
    </text>
  </g>

  <!-- ===== Commande 2 : cat stack.txt (t=1.8) ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.25s" fill="freeze"/>
    <text x="20" y="142" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#00cfff" filter="url(#glow)">baylox@github</text>
    <text x="136" y="142" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">:</text>
    <text x="144" y="142" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">~</text>
    <text x="156" y="142" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">$</text>
    <text x="170" y="142" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#e6edf3"> cat stack.txt</text>
  </g>

  <!-- Languages (t=2.6) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.2s" fill="freeze"/>
    <text x="20" y="170" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">Languages</text>
    <text x="160" y="170" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">›</text>
    <text x="176" y="170" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9">PHP · Java · TypeScript · Python · SQL</text>
  </g>

  <!-- Backend (t=2.85) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.85s" dur="0.2s" fill="freeze"/>
    <text x="20" y="196" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">Backend</text>
    <text x="160" y="196" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">›</text>
    <text x="176" y="196" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9">Symfony · Spring Boot · NestJS · Express</text>
  </g>

  <!-- Frontend (t=3.1) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.2s" fill="freeze"/>
    <text x="20" y="222" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">Frontend</text>
    <text x="160" y="222" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">›</text>
    <text x="176" y="222" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9">Angular · Next.js</text>
  </g>

  <!-- Data & ORM (t=3.35) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.35s" dur="0.2s" fill="freeze"/>
    <text x="20" y="248" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">Data &amp; ORM</text>
    <text x="160" y="248" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">›</text>
    <text x="176" y="248" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9">PostgreSQL · MySQL · Doctrine · Prisma · Hibernate</text>
  </g>

  <!-- DevOps (t=3.6) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.2s" fill="freeze"/>
    <text x="20" y="274" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">DevOps</text>
    <text x="160" y="274" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">›</text>
    <text x="176" y="274" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9">Docker · Git · Linux · Composer</text>
  </g>

  <!-- ===== Commande 3 : cat principles.txt (t=4.0) ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.25s" fill="freeze"/>
    <text x="20" y="308" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#00cfff" filter="url(#glow)">baylox@github</text>
    <text x="136" y="308" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">:</text>
    <text x="144" y="308" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">~</text>
    <text x="156" y="308" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">$</text>
    <text x="170" y="308" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#e6edf3"> cat principles.txt</text>
  </g>

  <!-- Sortie principles (t=4.8) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.25s" fill="freeze"/>
    <text x="20" y="336" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#c9d1d9">
      Clean Architecture · DDD · SOLID · REST · RBAC
    </text>
  </g>

  <!-- ===== Prompt final (t=5.6) ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.6s" dur="0.25s" fill="freeze"/>
    <text x="20" y="378" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#00cfff" filter="url(#glow)">baylox@github</text>
    <text x="136" y="378" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">:</text>
    <text x="144" y="378" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#ff6a00" filter="url(#glow)">~</text>
    <text x="156" y="378" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#6e7681">$</text>
  </g>

  <!-- Curseur clignotant (apparaît à t=5.6, puis clignote) -->
  <rect x="170" y="366" width="8" height="14" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.6s" dur="0.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" begin="5.8s" repeatCount="indefinite"/>
  </rect>

</svg>
